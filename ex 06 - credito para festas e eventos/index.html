<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Orçamento de Eventos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="header">
      <span class="icone">🎉</span>
      <div>
        <span class="titulo">Orçamento de Evento</span>
        <span class="subtitulo">Calcule o custo total do seu evento</span>
      </div>
    </header>

    <div class="card">

      <div class="campo">
        <label for="pacote">Pacote do evento</label>
        <select id="pacote">
          <option value="">Selecione um pacote</option>
          <option value="standard">Standard – R$ 50,00 / pessoa</option>
          <option value="premium">Premium – R$ 80,00 / pessoa</option>
          <option value="infinity">Infinity Deluxe – R$ 120,00 / pessoa</option>
        </select>
      </div>

      <div class="campo">
        <label for="pessoas">Quantidade de pessoas</label>
        <input type="number" id="pessoas" placeholder="Ex: 30" min="1" step="1">
      </div>

      <button id="btn-calcular">Calcular Orçamento</button>

    </div>

    <div id="resultado" class="resultado oculto">
      <h2 class="resultado-titulo">Resumo do orçamento</h2>

      <div class="resumo-grid">
        <div class="resumo-item">
          <span class="resumo-label">Custo bruto</span>
          <span class="resumo-valor" id="res-bruto">—</span>
        </div>
        <div class="resumo-item">
          <span class="resumo-label">Taxa de serviço (10%)</span>
          <span class="resumo-valor laranja" id="res-taxa">—</span>
        </div>
        <div class="resumo-item" id="linha-desconto">
          <span class="resumo-label" id="res-desconto-label">Desconto</span>
          <span class="resumo-valor verde" id="res-desconto">—</span>
        </div>
        <div class="resumo-item borda-topo">
          <span class="resumo-label">Total final</span>
          <span class="resumo-valor grande" id="res-total">—</span>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
