<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

  <style>
      body{
        text-align: center;
        padding: 0px;
        margin: 0px;
        justify-content: center;
        align-items: center;
        height: 100vh;
        display: flex;
      }

      .card{
        align-items: center;
        text-align: center;
        background-color: lightslategrey;
      }
  </style>  
</head>
<body>
    <div class="card w-96 bg-base-100 card-md shadow-sm">
  <div class="card-body">
    <h2 class="card-title"> Conversor </h2>
    <label for="valor"> </label>
    <a> Celsius para Fahrenheit </a>
    <input type="number" id="celsius" oninput="celsiusToFahrenheit(this.value)">
    <a> Fahrenheit para Celsius </a>
    <input type="number" id="fahrenheit" oninput="fahrenheitToCelsius(this.value)">
    <div class="justify-end card-actions">
      <button id="botao" class="btn btn-ghost">Enviar</button>
    </div>
  </div>
</div>
    <script src="script.js"> </script>
</body>
</html>
